<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Sessão - LS Fotostory</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="container">

        <h1>Agendar Sessão 📸</h1>

        <input type="text" id="nome" placeholder="Seu nome">

        <input type="email" id="email" placeholder="Seu e-mail">

        <input type="tel" id="telefone" placeholder="Seu telefone">

        <label>Data:</label>
        <input type="date" id="data">

        <label>Horário:</label>
        <input type="time" id="hora">

        <label>Responsável:</label>
        <select id="responsavel">
            <option value="Sarah">Sarah</option>
            <option value="Laryssa">Laryssa</option>
        </select>

        <textarea id="mensagem"
                  placeholder="Descreva o tipo de ensaio"></textarea>

        <button onclick="enviarAgendamento()">
            Enviar Agendamento
        </button>

    </section>

    <script type="module" src="js/agendamento.js"></script>

</body>
</html>
